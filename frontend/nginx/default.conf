map $host $spa_entry {
    default /index.html;
    bookedai.au /home.html;
    www.bookedai.au /home.html;
    admin.bookedai.au /admin.html;
    demo.bookedai.au /demo.html;
    ai.longcare.au /ai-mentor-pro.html;
    futureswim.bookedai.au /futureswim.html;
    chess.bookedai.au /chess.html;
    product.bookedai.au /product.html;
    portal.bookedai.au /index.html;
    tenant.bookedai.au /index.html;
    pitch.bookedai.au /pitch.html;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location ~ /\.(?!well-known) {
        access_log off;
        log_not_found off;
        return 404;
    }

    location ~* (^|/).+\.(?:bak|old|orig|save|swp|tmp|dist)$ {
        access_log off;
        log_not_found off;
        return 404;
    }

    location ~* (^|/).+\.(?:php[0-9]?|phtml|phar|cgi|pl|py|rb|asp|aspx|jsp)$ {
        access_log off;
        log_not_found off;
        return 404;
    }

    location ~* (^|/)(?:phpinfo|config|aws-config|aws\.config)(?:\.[A-Za-z0-9._-]+)?$ {
        access_log off;
        log_not_found off;
        return 404;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location = /admin.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location = /home.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location = /product.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location = /demo.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location = /futureswim.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location = /chess.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location = /ai-mentor-pro.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location = /pitch.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location ~* \.(?:css|js|mjs|json|svg|png|jpg|jpeg|gif|webp|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location /api/ {
        set $bookedai_backend http://backend:8000;
        proxy_pass $bookedai_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $spa_entry;
    }
}
