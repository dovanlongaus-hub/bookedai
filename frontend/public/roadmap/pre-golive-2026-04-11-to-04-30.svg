    <text x="60" y="106" font-size="12" font-weight="600" fill="#0891b2" letter-spacing="1.4">SOURCE OF TRUTH · docs/pm/roadmap-synced/01-MASTER-ROADMAP-SYNCED.md</text>
  </g>

