<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" font-family="Inter, system-ui, -apple-system, sans-serif" role="img" aria-label="BookedAI Sprint to Go-Live timeline 2026-04-11 to 2026-04-30 with 13 phases and milestones M-01 demo and M-02 go-live lock">
  <title>BookedAI — Sprint to Go-Live (2026-04-11 → 2026-04-30)</title>
  <desc>Daily Gantt grid showing 13 phases (P0–P9, P17, P18, P19) from 11 April 2026 to 30 April 2026. Status colours: shipped (emerald), shipped baseline (cyan), in-progress (amber), in-progress at-risk (rose). Today marker at 27 April; M-01 demo on 29 April; M-02 GO-LIVE LOCK on 30 April.</desc>

  <defs>
    <linearGradient id="bgFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f3f5f8"/>
    </linearGradient>
    <linearGradient id="m02Glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dc2626" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#dc2626" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1000" fill="url(#bgFade)"/>

  <!-- Header -->
