services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bookedai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookedai}
      POSTGRES_DB: ${POSTGRES_DB:-bookedai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    environment:
      APP_NAME: ${APP_NAME:-BookedAI}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:3000}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8000/api}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://bookedai:bookedai@db:5432/bookedai}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000,http://localhost:5173}
      AI_PROVIDER: ${AI_PROVIDER:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_MODEL: ${AI_MODEL:-}
      AI_FALLBACK_PROVIDER: ${AI_FALLBACK_PROVIDER:-}
      AI_FALLBACK_API_KEY: ${AI_FALLBACK_API_KEY:-}
      AI_FALLBACK_BASE_URL: ${AI_FALLBACK_BASE_URL:-}
      AI_FALLBACK_MODEL: ${AI_FALLBACK_MODEL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-30}
      BOOKING_BUSINESS_EMAIL: ${BOOKING_BUSINESS_EMAIL:-info@bookedai.au}
      EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST:-}
      EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-587}
      EMAIL_SMTP_USERNAME: ${EMAIL_SMTP_USERNAME:-}
      EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD:-}
      EMAIL_SMTP_FROM: ${EMAIL_SMTP_FROM:-}
      EMAIL_SMTP_USE_TLS: ${EMAIL_SMTP_USE_TLS:-false}
      EMAIL_SMTP_USE_STARTTLS: ${EMAIL_SMTP_USE_STARTTLS:-true}
      EMAIL_IMAP_HOST: ${EMAIL_IMAP_HOST:-}
      EMAIL_IMAP_PORT: ${EMAIL_IMAP_PORT:-993}
      EMAIL_IMAP_USERNAME: ${EMAIL_IMAP_USERNAME:-}
      EMAIL_IMAP_PASSWORD: ${EMAIL_IMAP_PASSWORD:-}
      EMAIL_IMAP_MAILBOX: ${EMAIL_IMAP_MAILBOX:-INBOX}
      EMAIL_IMAP_USE_SSL: ${EMAIL_IMAP_USE_SSL:-true}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
      ADMIN_SESSION_TTL_HOURS: ${ADMIN_SESSION_TTL_HOURS:-12}
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      target: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api}
    depends_on:
      - backend

volumes:
  postgres_data:

networks:
  default:
    external: true
    name: bookedai_internal
