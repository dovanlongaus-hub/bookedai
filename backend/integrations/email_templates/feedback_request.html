<!doctype html>
<!--
  feedback_request.html
  Subject: Quick feedback on your AI Mentor session
  Trigger: backend/service_layer/lifecycle_ops_service.py (24h after a session ends)
  Variables expected:
    {{customer_name}}
    {{booking_reference}}
    {{feedback_url}}
-->
<html>
  <body style="margin:0;background:#f5f5f7;font-family:-apple-system,Inter,Arial,sans-serif;color:#1d1d1f;">
    <div style="max-width:560px;margin:24px auto;padding:24px;background:#ffffff;border-radius:18px;">
      <p style="margin:0 0 12px 0;font-size:16px;">Hi {{customer_name}},</p>
      <p style="margin:0 0 16px 0;font-size:15px;line-height:1.6;">
        How was your AI Mentor session ({{booking_reference}})? A quick rating helps your mentor stay sharp.
      </p>
      <p style="margin:16px 0;font-size:18px;">
        <a href="{{feedback_url}}&rating=1" style="text-decoration:none;color:#0071e3;">1</a>&nbsp;&nbsp;
        <a href="{{feedback_url}}&rating=2" style="text-decoration:none;color:#0071e3;">2</a>&nbsp;&nbsp;
        <a href="{{feedback_url}}&rating=3" style="text-decoration:none;color:#0071e3;">3</a>&nbsp;&nbsp;
        <a href="{{feedback_url}}&rating=4" style="text-decoration:none;color:#0071e3;">4</a>&nbsp;&nbsp;
        <a href="{{feedback_url}}&rating=5" style="text-decoration:none;color:#0071e3;">5</a>
      </p>
      <p style="margin:24px 0;">
        <a href="{{feedback_url}}"
           style="display:inline-block;padding:12px 22px;background:#0071e3;color:#ffffff;text-decoration:none;border-radius:980px;font-weight:600;">
          Send your feedback
        </a>
      </p>
      <p style="margin:24px 0 0 0;font-size:13px;color:#6e6e73;">
        Thanks for being part of AI Mentor on BookedAI.
      </p>
    </div>
  </body>
</html>
