<!doctype html>
<!--
  aimentor_cancellation.en.html — EN cancellation email for AI Mentor bookings.
  Subject: AI Mentor session cancelled — {{booking_reference}}
  Trigger: lifecycle_ops_service cancellation step, locale = en
  Variables expected:
    {{customer_name}}
    {{booking_reference}}
    {{service_name}}
    {{cancelled_at_human}}
    {{support_email}}
    {{cta_url}}  (defaults to https://aimentor.bookedai.au/#programs)
-->
<html lang="en">
  <body style="margin:0;background:#fdfaf3;font-family:-apple-system,Inter,Arial,sans-serif;color:#1f2a26;">
    <div style="max-width:560px;margin:24px auto;padding:28px;background:#ffffff;border-radius:18px;border:1px solid rgba(15,92,84,0.12);">
      <h1 style="margin:0 0 16px 0;font-size:22px;font-weight:700;color:#1f2a26;">Your session has been cancelled</h1>
      <p style="margin:0 0 16px 0;font-size:15px;line-height:1.65;">
        Hi {{customer_name}}, we've cancelled your <strong>{{service_name}}</strong> booking
        (<strong>{{booking_reference}}</strong>) on {{cancelled_at_human}}. Any payment will be
        refunded per our policy.
      </p>
      <p style="margin:24px 0;">
        <a href="{{cta_url}}"
           style="display:inline-block;padding:12px 22px;background:#ff6b3d;color:#fdfaf3;text-decoration:none;border-radius:12px;font-weight:600;">
          Browse other slots
        </a>
      </p>
      <p style="margin:0 0 8px 0;font-size:14px;color:#5b6b66;">
        Need help? Email <a href="mailto:{{support_email}}" style="color:#0f5c54;text-decoration:none;">{{support_email}}</a> and we'll sort it out.
      </p>
      <p style="margin:18px 0 0 0;font-size:13px;color:#5b6b66;">— The AI Mentor team</p>
    </div>
  </body>
</html>
