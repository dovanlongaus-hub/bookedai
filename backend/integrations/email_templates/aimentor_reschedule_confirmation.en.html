<!doctype html>
<!--
  aimentor_reschedule_confirmation.en.html — EN reschedule confirmation email for AI Mentor bookings.
  Subject: AI Mentor session rescheduled — new time {{new_slot_label}}
  Trigger: lifecycle_ops_service reschedule step, locale = en
  Variables expected:
    {{customer_name}}
    {{booking_reference}}
    {{service_name}}
    {{new_slot_label}}
    {{new_meeting_url}}
    {{portal_url}}
    {{support_email}}
-->
<html lang="en">
  <body style="margin:0;background:#fdfaf3;font-family:-apple-system,Inter,Arial,sans-serif;color:#1f2a26;">
    <div style="max-width:560px;margin:24px auto;padding:28px;background:#ffffff;border-radius:18px;border:1px solid rgba(15,92,84,0.12);">
      <h1 style="margin:0 0 16px 0;font-size:22px;font-weight:700;color:#1f2a26;">Your new time is confirmed</h1>
      <p style="margin:0 0 16px 0;font-size:15px;line-height:1.65;">
        Hi {{customer_name}}, your <strong>{{service_name}}</strong> booking is now scheduled for
        <strong>{{new_slot_label}}</strong>. Use the link below to join.
      </p>
      <p style="margin:24px 0;">
        <a href="{{new_meeting_url}}"
           style="display:inline-block;padding:12px 22px;background:#ff6b3d;color:#fdfaf3;text-decoration:none;border-radius:12px;font-weight:600;">
          Join meeting
        </a>
      </p>
      <p style="margin:0 0 18px 0;font-size:14px;">
        <a href="{{portal_url}}" style="color:#0f5c54;text-decoration:none;">View booking</a>
      </p>
      <p style="margin:0 0 8px 0;font-size:14px;color:#5b6b66;">
        Questions? Email <a href="mailto:{{support_email}}" style="color:#0f5c54;text-decoration:none;">{{support_email}}</a> and we'll help out.
      </p>
      <p style="margin:18px 0 0 0;font-size:13px;color:#5b6b66;">— The AI Mentor team</p>
    </div>
  </body>
</html>
