services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL}
      PUBLIC_API_URL: ${PUBLIC_API_URL}
      DATABASE_URL: ${DATABASE_URL}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS}
      TAWK_WEBHOOK_SECRET: ${TAWK_WEBHOOK_SECRET}
      TAWK_VERIFY_SIGNATURE: ${TAWK_VERIFY_SIGNATURE}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_LOG_TABLE: ${SUPABASE_LOG_TABLE}
      N8N_BOOKING_WEBHOOK_URL: ${N8N_BOOKING_WEBHOOK_URL}
      N8N_API_KEY: ${N8N_API_KEY}
      N8N_WEBHOOK_BEARER_TOKEN: ${N8N_WEBHOOK_BEARER_TOKEN}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_CURRENCY: ${STRIPE_CURRENCY:-aud}
      BOOKING_BUSINESS_EMAIL: ${BOOKING_BUSINESS_EMAIL:-info@bookedai.au}
      EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST:-}
      EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-587}
      EMAIL_SMTP_USERNAME: ${EMAIL_SMTP_USERNAME:-}
      EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD:-}
      EMAIL_SMTP_FROM: ${EMAIL_SMTP_FROM:-}
      EMAIL_SMTP_USE_TLS: ${EMAIL_SMTP_USE_TLS:-false}
      EMAIL_SMTP_USE_STARTTLS: ${EMAIL_SMTP_USE_STARTTLS:-true}
      EMAIL_IMAP_HOST: ${EMAIL_IMAP_HOST:-}
      EMAIL_IMAP_PORT: ${EMAIL_IMAP_PORT:-993}
      EMAIL_IMAP_USERNAME: ${EMAIL_IMAP_USERNAME:-}
      EMAIL_IMAP_PASSWORD: ${EMAIL_IMAP_PASSWORD:-}
      EMAIL_IMAP_MAILBOX: ${EMAIL_IMAP_MAILBOX:-INBOX}
      EMAIL_IMAP_USE_SSL: ${EMAIL_IMAP_USE_SSL:-true}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
      ADMIN_SESSION_TTL_HOURS: ${ADMIN_SESSION_TTL_HOURS:-12}
      EXPOSE_API_DOCS: ${EXPOSE_API_DOCS:-false}
      BOOKING_CHAT_RATE_LIMIT_REQUESTS: ${BOOKING_CHAT_RATE_LIMIT_REQUESTS:-20}
      BOOKING_CHAT_RATE_LIMIT_WINDOW_SECONDS: ${BOOKING_CHAT_RATE_LIMIT_WINDOW_SECONDS:-60}
      BOOKING_SESSION_RATE_LIMIT_REQUESTS: ${BOOKING_SESSION_RATE_LIMIT_REQUESTS:-5}
      BOOKING_SESSION_RATE_LIMIT_WINDOW_SECONDS: ${BOOKING_SESSION_RATE_LIMIT_WINDOW_SECONDS:-300}
      UPLOAD_BASE_DIR: ${UPLOAD_BASE_DIR:-/app/storage/uploads}
      UPLOAD_PUBLIC_BASE_URL: ${UPLOAD_PUBLIC_BASE_URL:-https://upload.bookedai.au}
      UPLOAD_MAX_FILE_SIZE_BYTES: ${UPLOAD_MAX_FILE_SIZE_BYTES:-10485760}
    volumes:
      - ./storage/uploads:/app/storage/uploads

  web:
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.bookedai.au/api}
    restart: unless-stopped

  hermes:
    build:
      context: ./deploy/hermes
      args:
        HERMES_VERSION: ${HERMES_VERSION:-v0.5.0}
        HERMES_WEB_ALGOLIA_APP_ID: ${HERMES_ALGOLIA_APPLICATION_ID:-}
        HERMES_WEB_ALGOLIA_SEARCH_API_KEY: ${HERMES_ALGOLIA_SEARCH_API_KEY:-}
        HERMES_WEB_GOOGLE_OAUTH2_CLIENT_ID: ${HERMES_GOOGLE_OAUTH2_CLIENT_ID:-}
        HERMES_WEB_GOOGLE_OAUTH2_HD: ${HERMES_GOOGLE_OAUTH2_HD:-}
    restart: unless-stopped
    environment:
      HERMES_BASE_URL: ${HERMES_BASE_URL:-https://hermes.bookedai.au}
      HERMES_VERSION: ${HERMES_VERSION:-v0.5.0}
      HERMES_POSTGRES_HOST: ${HERMES_POSTGRES_HOST:-supabase-db}
      HERMES_POSTGRES_PORT: ${HERMES_POSTGRES_PORT:-5432}
      HERMES_POSTGRES_DB: ${HERMES_POSTGRES_DB:-hermes}
      HERMES_POSTGRES_USER: ${HERMES_POSTGRES_USER:-hermes_app}
      HERMES_POSTGRES_PASSWORD: ${HERMES_POSTGRES_PASSWORD:-}
      HERMES_ALGOLIA_APPLICATION_ID: ${HERMES_ALGOLIA_APPLICATION_ID:-}
      HERMES_ALGOLIA_SEARCH_API_KEY: ${HERMES_ALGOLIA_SEARCH_API_KEY:-}
      HERMES_ALGOLIA_WRITE_API_KEY: ${HERMES_ALGOLIA_WRITE_API_KEY:-}
      HERMES_ALGOLIA_DOCS_INDEX_NAME: ${HERMES_ALGOLIA_DOCS_INDEX_NAME:-docs}
      HERMES_ALGOLIA_DRAFTS_INDEX_NAME: ${HERMES_ALGOLIA_DRAFTS_INDEX_NAME:-drafts}
      HERMES_ALGOLIA_INTERNAL_INDEX_NAME: ${HERMES_ALGOLIA_INTERNAL_INDEX_NAME:-internal}
      HERMES_ALGOLIA_LINKS_INDEX_NAME: ${HERMES_ALGOLIA_LINKS_INDEX_NAME:-links}
      HERMES_ALGOLIA_MISSING_FIELDS_INDEX_NAME: ${HERMES_ALGOLIA_MISSING_FIELDS_INDEX_NAME:-missing_fields}
      HERMES_ALGOLIA_PROJECTS_INDEX_NAME: ${HERMES_ALGOLIA_PROJECTS_INDEX_NAME:-projects}
      HERMES_GOOGLE_WORKSPACE_DOMAIN: ${HERMES_GOOGLE_WORKSPACE_DOMAIN:-}
      HERMES_GOOGLE_WORKSPACE_DOCS_FOLDER: ${HERMES_GOOGLE_WORKSPACE_DOCS_FOLDER:-}
      HERMES_GOOGLE_WORKSPACE_DRAFTS_FOLDER: ${HERMES_GOOGLE_WORKSPACE_DRAFTS_FOLDER:-}
      HERMES_GOOGLE_WORKSPACE_SHORTCUTS_FOLDER: ${HERMES_GOOGLE_WORKSPACE_SHORTCUTS_FOLDER:-}
      HERMES_GOOGLE_OAUTH2_CLIENT_ID: ${HERMES_GOOGLE_OAUTH2_CLIENT_ID:-}
      HERMES_GOOGLE_OAUTH2_HD: ${HERMES_GOOGLE_OAUTH2_HD:-}
      HERMES_GOOGLE_OAUTH2_REDIRECT_URI: ${HERMES_GOOGLE_OAUTH2_REDIRECT_URI:-https://hermes.bookedai.au/torii/redirect.html}
      HERMES_GOOGLE_AUTH_CLIENT_EMAIL: ${HERMES_GOOGLE_AUTH_CLIENT_EMAIL:-}
      HERMES_GOOGLE_AUTH_PRIVATE_KEY: ${HERMES_GOOGLE_AUTH_PRIVATE_KEY:-}
      HERMES_GOOGLE_AUTH_SUBJECT: ${HERMES_GOOGLE_AUTH_SUBJECT:-}
      HERMES_TEMPLATE_RFC: ${HERMES_TEMPLATE_RFC:-placeholder-rfc-template-id}
      HERMES_TEMPLATE_PRD: ${HERMES_TEMPLATE_PRD:-placeholder-prd-template-id}

  n8n:
    image: n8nio/n8n:2.15.0
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: supabase-db
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME}
      DB_POSTGRESDB_USER: ${N8N_DB_USER}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD}
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_WEBHOOK_BEARER_TOKEN: ${N8N_WEBHOOK_BEARER_TOKEN}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_RUNNERS_ENABLED: ${N8N_RUNNERS_ENABLED:-true}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: ${N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS:-true}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Australia/Sydney}
    volumes:
      - n8n_data:/home/node/.n8n

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
      - backend
      - hermes
      - n8n
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/bookedai.au.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
      - ./storage/uploads:/var/www/uploads:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  n8n_data:

networks:
  default:
    external: true
    name: bookedai_internal
