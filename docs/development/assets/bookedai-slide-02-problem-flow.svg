<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="180" y1="90" x2="1380" y2="810" gradientUnits="userSpaceOnUse">
      <stop stop-color="#132544"/>
      <stop offset="1" stop-color="#07111E"/>
    </linearGradient>
    <linearGradient id="warnFlow" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FB7185"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" rx="36" fill="url(#bg2)"/>
  <circle cx="240" cy="180" r="120" fill="#FB7185" fill-opacity="0.10"/>
  <circle cx="1360" cy="180" r="140" fill="#F59E0B" fill-opacity="0.12"/>

  <text x="110" y="120" fill="#FB7185" font-size="24" font-family="Arial, sans-serif" letter-spacing="4">PROBLEM</text>
  <text x="110" y="175" fill="#F5F9FF" font-size="54" font-family="Arial, sans-serif" font-weight="700">Revenue leaks between inquiry and outcome</text>
  <text x="110" y="220" fill="#ADC0DA" font-size="24" font-family="Arial, sans-serif">Three recurring failure points make service demand fragmented, slow to convert, and hard to control.</text>

  <rect x="110" y="305" width="400" height="360" rx="30" fill="#11233C" stroke="rgba(255,255,255,0.12)"/>
  <text x="150" y="365" fill="#F5F9FF" font-size="34" font-family="Arial, sans-serif" font-weight="700">1. Broken intake</text>
  <text x="150" y="420" fill="#ADC0DA" font-size="24" font-family="Arial, sans-serif">Search, DMs, forms, and chats land in separate places.</text>
  <text x="150" y="465" fill="#ADC0DA" font-size="24" font-family="Arial, sans-serif">No single conversion flow owns the journey.</text>
  <circle cx="170" cy="540" r="8" fill="#FB7185"/>
  <text x="195" y="548" fill="#F5F9FF" font-size="22" font-family="Arial, sans-serif">Demand gets split early</text>

  <rect x="600" y="305" width="400" height="360" rx="30" fill="#11233C" stroke="rgba(255,255,255,0.12)"/>
  <text x="640" y="365" fill="#F5F9FF" font-size="34" font-family="Arial, sans-serif" font-weight="700">2. Operational gaps</text>
  <text x="640" y="420" fill="#ADC0DA" font-size="24" font-family="Arial, sans-serif">Qualification, scheduling, CRM, and payment follow-up disconnect.</text>
  <text x="640" y="465" fill="#ADC0DA" font-size="24" font-family="Arial, sans-serif">Context drops between systems and teams.</text>
  <circle cx="660" cy="540" r="8" fill="#F59E0B"/>
  <text x="685" y="548" fill="#F5F9FF" font-size="22" font-family="Arial, sans-serif">Conversion loses momentum</text>

  <rect x="1090" y="305" width="400" height="360" rx="30" fill="#11233C" stroke="rgba(255,255,255,0.12)"/>
  <text x="1130" y="365" fill="#F5F9FF" font-size="34" font-family="Arial, sans-serif" font-weight="700">3. No control surface</text>
  <text x="1130" y="420" fill="#ADC0DA" font-size="24" font-family="Arial, sans-serif">Operators lack one workspace for bookings, sync, audit, and recovery.</text>
  <text x="1130" y="465" fill="#ADC0DA" font-size="24" font-family="Arial, sans-serif">Problems are discovered late and fixed manually.</text>
  <circle cx="1150" cy="540" r="8" fill="#FB7185"/>
  <text x="1175" y="548" fill="#F5F9FF" font-size="22" font-family="Arial, sans-serif">Visibility arrives too late</text>

  <path d="M510 485H600" stroke="url(#warnFlow)" stroke-width="10" stroke-linecap="round"/>
  <path d="M1000 485H1090" stroke="url(#warnFlow)" stroke-width="10" stroke-linecap="round"/>

  <rect x="290" y="730" width="1020" height="92" rx="22" fill="#0E1A2C" stroke="rgba(255,255,255,0.1)"/>
  <text x="330" y="787" fill="#F5F9FF" font-size="28" font-family="Arial, sans-serif" font-weight="700">Result: demand exists, but the path to booked revenue is fragmented and hard to manage.</text>
</svg>
