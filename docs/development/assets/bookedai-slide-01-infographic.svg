<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGlow" x1="250" y1="120" x2="1330" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#163055"/>
      <stop offset="1" stop-color="#0A1424"/>
    </linearGradient>
    <linearGradient id="lineGlow" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#6EE7FF"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
  </defs>
  <rect width="1600" height="900" rx="36" fill="url(#bgGlow)"/>
  <circle cx="220" cy="190" r="120" fill="#6EE7FF" fill-opacity="0.12"/>
  <circle cx="1320" cy="170" r="130" fill="#8B5CF6" fill-opacity="0.15"/>
  <circle cx="1260" cy="760" r="160" fill="#6EE7FF" fill-opacity="0.08"/>

  <text x="110" y="120" fill="#6EE7FF" font-size="24" font-family="Arial, sans-serif" letter-spacing="4">REVENUE FLOW</text>
  <text x="110" y="175" fill="#F5F9FF" font-size="54" font-family="Arial, sans-serif" font-weight="700">From inbound chaos to operator control</text>
  <text x="110" y="220" fill="#ADC0DA" font-size="24" font-family="Arial, sans-serif">A visual summary for slide 1, showing how BookedAI connects fragmented demand into one managed revenue engine.</text>

  <rect x="110" y="305" width="270" height="220" rx="28" fill="#11233C" stroke="rgba(255,255,255,0.14)"/>
  <text x="150" y="355" fill="#F5F9FF" font-size="34" font-family="Arial, sans-serif" font-weight="700">Inbound signals</text>
  <g fill="#ADC0DA" font-size="24" font-family="Arial, sans-serif">
    <text x="150" y="410">Search</text>
    <text x="150" y="450">Calls</text>
    <text x="150" y="490">Emails</text>
    <text x="150" y="530">Forms and DMs</text>
  </g>

  <rect x="505" y="265" width="330" height="300" rx="34" fill="#162A46" stroke="#6EE7FF" stroke-opacity="0.4"/>
  <text x="555" y="330" fill="#6EE7FF" font-size="20" font-family="Arial, sans-serif" letter-spacing="3">BOOKEDAI</text>
  <text x="555" y="385" fill="#F5F9FF" font-size="42" font-family="Arial, sans-serif" font-weight="700">AI conversation</text>
  <text x="555" y="430" fill="#F5F9FF" font-size="42" font-family="Arial, sans-serif" font-weight="700">booking intent</text>
  <text x="555" y="485" fill="#ADC0DA" font-size="24" font-family="Arial, sans-serif">Capture customer intent, qualify demand,</text>
  <text x="555" y="520" fill="#ADC0DA" font-size="24" font-family="Arial, sans-serif">and route toward action.</text>

  <rect x="960" y="305" width="520" height="220" rx="28" fill="#11233C" stroke="rgba(255,255,255,0.14)"/>
  <text x="1000" y="355" fill="#F5F9FF" font-size="34" font-family="Arial, sans-serif" font-weight="700">Revenue outcomes</text>
  <g fill="#ADC0DA" font-size="24" font-family="Arial, sans-serif">
    <text x="1000" y="410">Bookings and follow-up</text>
    <text x="1000" y="450">CRM sync and tenant context</text>
    <text x="1000" y="490">Payment posture and audit trail</text>
    <text x="1000" y="530">Operator visibility and control</text>
  </g>

  <path d="M380 415H505" stroke="url(#lineGlow)" stroke-width="12" stroke-linecap="round" filter="url(#soft)"/>
  <path d="M835 415H960" stroke="url(#lineGlow)" stroke-width="12" stroke-linecap="round" filter="url(#soft)"/>
  <circle cx="505" cy="415" r="10" fill="#6EE7FF"/>
  <circle cx="960" cy="415" r="10" fill="#8B5CF6"/>

  <rect x="250" y="655" width="1100" height="120" rx="24" fill="#0E1C31" stroke="rgba(255,255,255,0.1)"/>
  <text x="310" y="713" fill="#F5F9FF" font-size="30" font-family="Arial, sans-serif" font-weight="700">One engine, not point tools</text>
  <text x="310" y="755" fill="#ADC0DA" font-size="24" font-family="Arial, sans-serif">BookedAI joins the front door, the booking layer, and the operator control plane into one revenue workflow.</text>
</svg>
