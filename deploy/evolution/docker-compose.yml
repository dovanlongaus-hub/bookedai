services:
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.6
    container_name: bookedai-evolution
    restart: unless-stopped
    ports:
      - "${EVOLUTION_PORT:-8088}:8080"
    environment:
      SERVER_URL: ${EVOLUTION_PUBLIC_URL:-https://waba.bookedai.au}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      CONFIG_SESSION_PHONE_CLIENT: ${CONFIG_SESSION_PHONE_CLIENT:-BookedAI WhatsApp Booking Agent}
      CONFIG_SESSION_PHONE_NAME: ${CONFIG_SESSION_PHONE_NAME:-Chrome}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: ${EVOLUTION_DATABASE_URL}
      DATABASE_CONNECTION_CLIENT_NAME: evolution_api
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      WEBHOOK_GLOBAL_URL: ${EVOLUTION_WEBHOOK_URL:-https://api.bookedai.au/api/webhooks/evolution}
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_MESSAGES_UPDATE: "false"
      WEBHOOK_EVENTS_MESSAGES_DELETE: "false"
      WEBHOOK_EVENTS_SEND_MESSAGE: "false"
      WEBHOOK_EVENTS_CONTACTS_UPDATE: "false"
      WEBHOOK_EVENTS_CHATS_UPDATE: "false"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"
      LOG_LEVEL: "DEBUG"
      LOG_COLOR: "false"
      QRCODE_LIMIT: "30"
      LANGUAGE: "en"
      CACHE_REDIS_ENABLED: "false"
      CACHE_LOCAL_ENABLED: "true"
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - bookedai_internal

volumes:
  evolution_instances:
    name: bookedai_evolution_instances

networks:
  bookedai_internal:
    external: true
