services:
  openclaw-internal-api-bridge:
    build:
      context: ./internal-api-bridge
    container_name: openclaw-bookedai-internal-api-bridge
    environment:
      BOOKEDAI_INTERNAL_API_BASE_URL: ${BOOKEDAI_INTERNAL_API_BASE_URL:-http://backend:8000/api/internal/v1}
      BOOKEDAI_INTERNAL_TOKEN: ${BOOKEDAI_INTERNAL_TOKEN:-bookedai-mvp-internal-dummy}
      BOOKEDAI_PUBLIC_API_BASE_URL: ${BOOKEDAI_PUBLIC_API_BASE_URL:-http://backend:8000/api}
      OPENCLAW_BRIDGE_SHARED_TOKEN: ${OPENCLAW_BRIDGE_SHARED_TOKEN:-bookedai-openclaw-bridge-dummy}
      OPENCLAW_BRIDGE_REQUEST_TIMEOUT_SECONDS: ${OPENCLAW_BRIDGE_REQUEST_TIMEOUT_SECONDS:-25}
      OPENCLAW_BRIDGE_ALLOWED_PREFIXES: ${OPENCLAW_BRIDGE_ALLOWED_PREFIXES:-booking,search,communications,integrations}
      OPENCLAW_BRIDGE_CORS_ORIGINS: ${OPENCLAW_BRIDGE_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
      OPENCLAW_BRIDGE_PUBLIC_STREAM_TIMEOUT_SECONDS: ${OPENCLAW_BRIDGE_PUBLIC_STREAM_TIMEOUT_SECONDS:-300}
    ports:
      - "${OPENCLAW_INTERNAL_API_BRIDGE_PORT:-18810}:18810"
    networks:
      - default
      - bookedai_internal
    init: true
    restart: unless-stopped

  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:2026.3.12}
    container_name: openclaw-bookedai-gateway
    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: ${OPENCLAW_TZ:-UTC}
      CODEX_HOME: /home/node/.codex
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BOOKEDAI_TELEGRAM_TRUSTED_USER_IDS: ${BOOKEDAI_TELEGRAM_TRUSTED_USER_IDS:-8426853622}
      BOOKEDAI_TELEGRAM_ALLOWED_ACTIONS: ${BOOKEDAI_TELEGRAM_ALLOWED_ACTIONS:-sync_doc,sync_repo_docs,build_frontend,deploy_live,test,workspace_write,repo_structure,host_command,host_shell,full_project}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - ${BOOKEDAI_REPO_DIR}:/workspace/bookedai.au
      - ${CODEX_HOME_DIR}:/home/node/.codex
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    networks:
      - default
      - bookedai_internal
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789"
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 720s

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:2026.3.12}
    container_name: openclaw-bookedai-cli
    network_mode: "service:openclaw-gateway"
    user: "0:0"
    privileged: true
    pid: host
    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: ${OPENCLAW_TZ:-UTC}
      BROWSER: echo
      CODEX_HOME: /home/node/.codex
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BOOKEDAI_TELEGRAM_TRUSTED_USER_IDS: ${BOOKEDAI_TELEGRAM_TRUSTED_USER_IDS:-8426853622}
      BOOKEDAI_TELEGRAM_ALLOWED_ACTIONS: ${BOOKEDAI_TELEGRAM_ALLOWED_ACTIONS:-sync_doc,sync_repo_docs,build_frontend,deploy_live,test,workspace_write,repo_structure,host_command,host_shell,full_project}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - ${BOOKEDAI_REPO_DIR}:/workspace/bookedai.au
      - ${CODEX_HOME_DIR}:/home/node/.codex
      - /:/hostfs
      - /var/run/docker.sock:/var/run/docker.sock
    stdin_open: true
    tty: true
    init: true
    restart: unless-stopped
    entrypoint: ["node", "dist/index.js"]
    command:
      [
        "node",
        "run",
        "--host",
        "127.0.0.1",
        "--port",
        "18789",
        "--display-name",
        "bookedai-host-cli"
      ]
    depends_on:
      - openclaw-internal-api-bridge
      - openclaw-gateway

networks:
  default:
    name: openclaw_default
  bookedai_internal:
    external: true
