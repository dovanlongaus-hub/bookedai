server {
    listen 443 ssl;
    http2 on;
    server_name upload.bookedai.au;

    ssl_certificate /etc/letsencrypt/live/bookedai.au/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bookedai.au/privkey.pem;

    client_max_body_size 20m;

    location ~ /\.(?!well-known) {
        access_log off;
        log_not_found off;
        return 404;
    }

    location = / {
        root /var/www/uploads;
        try_files /index.html =404;
        add_header Cache-Control "no-cache";
    }

    location = /index.html {
        root /var/www/uploads;
        try_files /index.html =404;
        add_header Cache-Control "no-cache";
    }

    location / {
        root /var/www/uploads;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

