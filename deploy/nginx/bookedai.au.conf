server {
    listen 443 ssl;
    http2 on;
    server_name www.bookedai.au;

    ssl_certificate /etc/letsencrypt/live/bookedai.au/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bookedai.au/privkey.pem;

    return 301 https://bookedai.au$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.bookedai.au;

    ssl_certificate /etc/letsencrypt/live/bookedai.au/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bookedai.au/privkey.pem;

    client_max_body_size 20m;

    location ~ /\.(?!well-known) {
        access_log off;
        log_not_found off;
        return 404;
    }


    location /telegram-webhook {
        set $bookedai_openclaw_webhook http://openclaw-bookedai-gateway:8787;
        proxy_pass $bookedai_openclaw_webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }

    location / {
        set $bookedai_backend http://backend:8000;
        proxy_pass $bookedai_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }
}

